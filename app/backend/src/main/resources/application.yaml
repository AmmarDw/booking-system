spring:
  application:
    name: booking-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booking_system}
    username: ${DB_USER:bookingadmin}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:465}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASS:}
    properties:
      "[mail.smtp.auth]": true
      # Port 465 is implicit SSL (not STARTTLS on 587) — this property, not starttls.enable, is
      # what makes JavaMail actually use SSL for the initial connection.
      "[mail.smtp.ssl.enable]": true

# Booking policy defaults (seed values). The admin's live value is persisted in
# the single-row AppSettings table and overrides this default at runtime (FR-14/FR-15).
booking:
  max-horizon-months: 6
  # Providers may pre-load availability further ahead than consumers can book.
  # Advance limit = ceil(max-horizon-months * provider-advance-multiplier). Not admin-facing.
  provider-advance-multiplier: 1.5

# Google Calendar/Meet OAuth (M6, FR-6/FR-13). Consumed once the provider-onboarding
# controller is built; safe to bind now.
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/google/oauth2/callback}
  # calendar.events to create/manage the Meet-enabled event; userinfo.email to show which Google
  # account is connected in the UI (report §6.4 prompt H).
  scope: "https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/userinfo.email"
  token-encryption-key: ${TOKEN_ENCRYPTION_KEY:}

# JWT auth (M2)
app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: 86400000 # 24h
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000}
